name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку кнопкой вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Скачиваем исходный код
      uses: actions/checkout@v4

    - name: Настраиваем Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Тестовый шаг (пока нет кода)
      run: echo "Фабрика готова к сборке приложения WaveBypass!"
